name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  web-dashboard:
    name: Web Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-dashboard/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
