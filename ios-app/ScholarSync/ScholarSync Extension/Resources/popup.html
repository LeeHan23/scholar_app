<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 300px;
      margin: 0;
      padding: 16px;
      background-color: #f8fafc;
      color: #0f172a;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .title {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }
    .info-box {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .label {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 4px;
      display: block;
    }
    .value {
      font-size: 14px;
      font-weight: 500;
      word-break: break-all;
    }
    .btn-save {
      width: 100%;
      background-color: #3b82f6;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .btn-save:hover {
      background-color: #2563eb;
    }
    .btn-save:disabled {
      background-color: #94a3b8;
      cursor: not-allowed;
    }
    .missing-info {
      color: #ef4444;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 class="title">ScholarSync</h1>
  </div>
  
  <div id="loading">Scanning for papers...</div>
  
  <div id="content" style="display: none;">
    <div class="info-box">
      <span class="label">Title</span>
      <div id="paper-title" class="value"></div>
    </div>
    <div class="info-box">
      <span class="label">Identifier</span>
      <div id="paper-id" class="value"></div>
    </div>
    
    <button id="save-btn" class="btn-save">Save to Reading Queue</button>
  </div>
  
  <div id="error" class="missing-info" style="display: none;">
    No scholarly paper detected on this page.
  </div>

  <script src="popup.js"></script>
</body>
</html>
